version: "3.8"

services:
  app:
    build: ./app
    container_name: docker-infra-app
    restart: unless-stopped
    environment:
      - PORT=3000
      - NODE_ENV=production
    networks:
      - infra-network

  db:
    image: mysql:8.0
    container_name: docker-infra-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - infra-network

  nginx:
    image: nginx:alpine
    container_name: docker-infra-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - infra-network

volumes:
  db-data:

networks:
  infra-network:
    driver: bridge
